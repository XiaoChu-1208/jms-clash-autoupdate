# jms-clash-autoupdate 配置示例
# 复制到 ~/.config/jms-clash-autoupdate/config.yaml 后按需修改。
# install.sh 会引导你自动生成这个文件，一般不用手写。

# ── 必填 ────────────────────────────────────────────────
# 你的机场订阅链接（JustMySocks 在「Service」页，是那条 https://jmssub.net/.../getsub.php?... 链接）。
# ⚠️ 这是你的付费账号密钥，别公开、别提交进 git！
sub_url: "https://把这里换成你自己的订阅链接"

# ── 选填 ────────────────────────────────────────────────
# 节点稳定标识的正则。机场的节点名/地址里通常带一个跨次更新都不变的串，
# 用它把「同一个节点的新旧 IP」对应起来。JustMySocks 一般是 c70s1 / c70s2 / c70s801 这种。
# 不确定就先留默认，跑一次看日志里的「节点」列对不对得上。
node_key_pattern: "c70s\\d+"

# 节点友好名：键 = 上面正则匹配到的串（小写），值 = 你想显示的名字。
# 不填就用订阅自带的名字。建议名字末尾保留「· 标识」（如 · c70s1），
# 这样改名后脚本仍能靠标识对齐刷新。
names: {}
#  c70s1: "🇺🇸 洛杉矶 1 · c70s1"
#  c70s2: "🇺🇸 洛杉矶 2 · c70s2"
#  c70s4: "🇯🇵 大阪 · c70s4"

# 只保留「友好名里含这些关键词」的节点（留空 = 全部保留）。
# 用于固定只走某地区出口、保持出口 IP 纯净。需要配合上面 names 使用。
only_locations: []
#  - "洛杉矶"

# 域名优先：不少机场（含 JustMySocks）的节点名里带一个稳定域名
# （如 JMS-...@c70s1.example.com:7929），而 server 字段是会轮换的裸 IP。
# 开启后用域名当 server，IP 轮换由 DNS 解析兜住，配置不再因换 IP 而过期。
# 节点名里没有域名时此选项无效果，所以默认开着也安全。
prefer_domain: true

# 更新自检地址：jms-verge-update 真正落盘前后各经本机 Clash 混合端口访问一次这个地址；
# 「更新前是通的、更新后不通」会自动回滚本次改动，绝不把可用状态改坏。
probe_url: "https://www.google.com/generate_204"
